# Hero headline. Wrap the highlighted span in [hl]...[/hl].
headline: "Better models through [hl]better data[/hl]"

lead: >
  I'm Sid, and I lead **multimodal data curation at DatologyAI** — choosing, filtering, and
  synthesizing the data that models train on. My thesis is that curating the data is the
  highest-leverage way to improve a model. My work spans the research behind those
  **curation methods**, the **production-grade training infrastructure** that runs them, and
  **evaluation research** — because good evals are upstream of all good ML research.

