# "About / Why I do this" section.
story:
  quote: >
    Five years ago I left a comfortable software job in Big Tech to start a PhD. Last year I left
    the PhD to join Datology. Both were the same bet:
    [hl]I wanted to do research in the truest sense of the word[/hl].
  body: >
    Not chasing deadlines — sitting with messy, unsolved, sometimes previously unheard-of problems
    and slowly making sense of them. Deep learning hooked me precisely because it blends empiricism,
    mathematics, and real-world impact all at once, and I've chased that feeling across every risk
    I've taken since. I care about research that's both rigorous and genuinely useful — and, just as
    much, about growing the people I get to work with along the way.
  punchline: "Take risks. Bet on yourself."
  attribution: >
    When I'm not training models, you'll find me reading philosophy, out on a run, or writing —
    long-form at [Medium](https://medium.com/@sjoshi804) and, more lately, on
    [Substack](https://substack.com/@sjoshi804).

